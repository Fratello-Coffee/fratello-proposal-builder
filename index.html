html,body{height:100%}

::-webkit-scrollbar{width:3px;background:transparent}

input::placeholder{color:rgba(255,255,255,0.22)}
input:focus{outline:none!important}
button{font-family:'Montserrat',sans-serif}
#splash{position:fixed;inset:0;z-index:9999;background:#0d0d0d;display:flex;flex-direction:column;align-items:center;justify-content:center;transition:opacity 0.7s ease,visibility 0.7s ease}
#splash.out{opacity:0;visibility:hidden;pointer-events:none}
.splash-logo{font-size:clamp(42px,9vw,88px);font-weight:900;letter-spacing:0.26em;color:#fff;text-transform:uppercase;opacity:0;transform:translateY(18px);animation:fadeUp 0.9s cubic-bezier(0.22,1,0.36,1) 0.2s forwards}
.splash-rule{width:0;height:1px;background:#2eb4af;opacity:0.5;animation:expandRule 0.7s ease 0.9s forwards;margin:24px 0}
.splash-sub{font-size:11px;font-style:italic;letter-spacing:0.4em;color:rgba(255,255,255,0.4);text-transform:uppercase;font-family:'Cormorant Garamond',serif;opacity:0;animation:fadeUp 0.7s ease 1.1s forwards}
.splash-dots{display:flex;gap:6px;margin-top:48px;opacity:0;animation:fadeUp 0.5s ease 1.4s forwards}
.splash-dot{width:5px;height:5px;border-radius:50%;background:rgba(46,180,175,0.35);animation:pulse 1.2s ease infinite}
.splash-dot:nth-child(2){animation-delay:0.2s}
.splash-dot:nth-child(3){animation-delay:0.4s}
@keyframes fadeUp{to{opacity:1;transform:translateY(0)}}
@keyframes expandRule{to{width:72px}}
@keyframes pulse{0%,100%{background:rgba(46,180,175,0.25);transform:scale(1)}50%{background:#2eb4af;transform:scale(1.3)}}
.card-enter{animation:cardIn 0.3s cubic-bezier(0.22,1,0.36,1) forwards}
@keyframes cardIn{from{opacity:0;transform:translateY(10px) scale(0.97)}to{opacity:1;transform:none}}

.float-bar.show{transform:translateX(-50%) translateY(0);opacity:1;pointer-events:auto}
.modal-backdrop{position:fixed;inset:0;z-index:200;background:rgba(0,0,0,0);backdrop-filter:blur(0px);display:flex;align-items:center;justify-content:center;transition:background 0.25s ease,backdrop-filter 0.25s ease;pointer-events:none}
.modal-backdrop.open{background:rgba(0,0,0,0.82);backdrop-filter:blur(4px);pointer-events:auto}
.modal-box{background:#141414;border:1px solid rgba(255,255,255,0.1);border-radius:14px;padding:36px;width:360px;transform:scale(0.92) translateY(12px);opacity:0;transition:transform 0.3s cubic-bezier(0.22,1,0.36,1),opacity 0.25s ease}
.modal-backdrop.open .modal-box{transform:scale(1) translateY(0);opacity:1}
.cat-pill{cursor:pointer;border-radius:6px;font-size:10px;font-weight:700;letter-spacing:1px;padding:6px 13px;transition:all 0.15s ease;border:none;white-space:nowrap}
/* Hover only on non-touch (pointer:fine = mouse) */
@media(hover:hover) and (pointer:fine){
  .prod-card:hover{transform:translateY(-3px);box-shadow:0 6px 24px rgba(0,0,0,0.4)}
}
/* Active tap feedback for touch */
.prod-card:active{transform:scale(0.97);transition-duration:0.05s}

/* ── MOBILE RESPONSIVE ── */
@media(max-width:768px){
  /* Header */
  .mobile-header{flex-wrap:wrap!important;height:auto!important;padding:10px 14px!important;gap:8px!important}
  .mobile-header .hdr-brand{font-size:14px!important}
  .mobile-header .hdr-btns{width:100%;display:flex!important;justify-content:flex-end!important;gap:6px!important;flex-wrap:wrap!important}

  .mobile-filters .cat-pill{font-size:9px!important;padding:5px 10px!important;flex-shrink:0}
  .mobile-filters input{width:140px!important;min-width:100px!important;flex-shrink:0;font-size:12px!important}
  .mobile-filters .filter-count{display:none!important}

  .float-bar{left:10px!important;right:10px!important;transform:translateY(80px)!important;padding:10px 14px!important;gap:10px!important;border-radius:16px!important;flex-wrap:wrap!important;justify-content:center!important;white-space:normal!important;bottom:12px!important}

  .modal-box{width:92%!important;max-width:360px!important;padding:24px 20px!important}

  .mobile-propbar{flex-wrap:wrap!important;height:auto!important;padding:10px 14px!important;gap:8px!important;justify-content:center!important}

  .mobile-propbar span{font-size:8px!important}

  .mobile-header .hdr-brand{font-size:12px!important;letter-spacing:0.15em!important}

// ── ROAST DOTS HTML ────────────────────────────────────────────────────────────
function roastHTML(n) {
  if(!n) return '';
  const dots=[1,2,3,4,5].map(i=>`<div class="rt${i<=n?' on':''}"></div>`).join('');
  return `<div class="pc-roast"><span class="roast-lbl">Roast</span><div class="roast-track">${dots}</div></div>`;
}

// ── SIZES HTML ────────────────────────────────────────────────────────────────
function sizesHTML(sizes) {
  if(!sizes||!sizes.length) return '';
  return `<div class="pc-sizes">${sizes.map(s=>`<span class="pc-size-pill">${s}</span>`).join('')}</div>`;
}

// ── PC CARD ───────────────────────────────────────────────────────────────────
function pcCardHTML(p,isNespresso) {
  const displayName=p.name||'';
  const nameParts=displayName.split('\n');
  const nameDisplay=nameParts.length>1?`${nameParts[0]}<br>${nameParts[1]}`:nameParts[0];
  const nameSize=displayName.length>14?' sm':'';
  const imgClass=isNespresso?'pc-img nespresso-img':'pc-img';
  const sizesArr=JSON.stringify(p.sizes||[]);
  const imgHTML=p.comingSoon
    ?`<div class="pc-coming-soon"><span class="pc-cs-badge">Coming Soon</span></div>`
    :`<img class="${imgClass}" src="${p.img}" alt="${p.name}"
        style="cursor:pointer;"
        onclick="openLB('${p.img}','${(p.eyebrow||'').replace(/'/g,"\'")}','${(p.name||'').replace(/'/g,"\'")}','${(p.origin||'').replace(/'/g,"\'")}','${(p.vibe||'').replace(/'/g,"\'")}','${(p.desc||'').replace(/'/g,"\'")}',${p.roast||0},${sizesArr})"
        onerror="window.imgFallback&&window.imgFallback(this,'${(p.name||'').replace(/'/g,"\\'")}')">`;
  return `<div class="pc">
  ${imgHTML}
  <span class="eyebrow pc-eye">${p.eyebrow}</span>
  <div class="pc-name${nameSize}">${nameDisplay}</div>
  <div class="pc-origin">${p.origin}</div>
  <div class="pc-vibe">— ${p.vibe} —</div>
  <div class="pc-desc">${p.desc}</div>
  ${roastHTML(p.roast)}
  ${sizesHTML(p.sizes)}
</div>`;
}

// ── TC CARD (Tea style) ───────────────────────────────────────────────────────
function tcCardHTML(p) {
  const eyeLow=(p.eyebrow||'').toLowerCase();
  const isLooseTea=!eyeLow.includes('latte')&&!eyeLow.includes('concentrate');
  const isPowder=eyeLow.includes('latte');
  let formats='';
  if(isLooseTea)formats=`<div class="tc-formats">Loose Leaf<span class="sep">·</span>Tea Bags</div>`;
  else if(isPowder)formats=`<div class="tc-formats">Powder</div>`;
  return `<div class="tc">
  <img class="tc-img" src="${p.img}" alt="${p.name}" onerror="window.imgFallback&&window.imgFallback(this,'${(p.name||'').replace(/'/g,"\\'")}')">
  <div class="tc-name">${p.name}</div>
  <div class="tc-origin">${p.eyebrow}</div>
  <div class="tc-desc">${p.vibe} — ${p.desc}</div>
  <div class="tc-sizes">${p.sizes.map(s=>`<span class="tc-size-pill">${s}</span>`).join('')}</div>
  ${formats}
</div>`;
}

// ── GRID WRAPPER ──────────────────────────────────────────────────────────────
function wrapGrid(items,isTea,isNespresso) {
  if(isTea) return `<div class="t-grid">${items.map(tcCardHTML).join('')}</div>`;
  const n=items.length;
  // Balance: choose cols so products fill rows evenly on A4 landscape
  // 1=centered, 2=2col wide, 3=3col, 4=4col, 5=3col(2+3), 6=3col(2rows), 7-8=4col(2rows)
  let cls;
  if(n===1) cls='pg-1';
  else if(n===2) cls='pg-2';
  else if(n===3) cls='pg-3';
  else if(n===4) cls='pg-4';
  else if(n===5||n===6) cls='pg-3';
  else cls='pg-4';
  return `<div class="${cls}">${items.map(p=>pcCardHTML(p,isNespresso)).join('')}</div>`;
}

// ── PC HERO (Godfather Classic special layout) ─────────────────────────────────
function heroHTML(p) {
  return `<div class="pc-hero">
  <div class="pc-hero-img-wrap">
    <img src="${p.img}" alt="${p.name}" style="cursor:pointer;"
      onclick="openLB('${p.img}','${(p.eyebrow||'').replace(/'/g,"\'")}','${p.name}','${p.origin}','${p.vibe}','${p.desc}',${p.roast||0},${JSON.stringify(p.sizes||[])})"
      onerror="window.imgFallback&&window.imgFallback(this,'${(p.name||'').replace(/'/g,"\\'")}')">
  </div>
  <div class="pc-hero-body">
    <span class="eyebrow">${p.eyebrow}</span>
    <div class="pc-hero-name">Godfather<br>Espresso</div>
    <div class="pc-hero-sub">${p.origin}</div>
    <div class="pc-hero-vibe">— ${p.vibe} —</div>
    <p class="pc-hero-desc">${p.desc}</p>
    ${roastHTML(p.roast)}
  </div>
</div>`;
}

function chapHTML(cat,meta,colNum) {

  <div class="chap-overlay"></div>

      <p class="chap-body">${meta.body}</p>

</section>`;
}

// ── PRODUCT PAGE ──────────────────────────────────────────────────────────────
function productPageHTML(cat,meta,items,colNum,colLabel,isLastBatch=true) {
  const isTea=cat==='Tea';
  const isNespresso=cat==='Nespresso';
  const pageTag=isTea?'tea-page':'prod-page';
  // Landscape: max items per page before overflow
  const maxPerPage=isTea?10:(isNespresso?4:8);
  const TEA_NOTE=`<div class="tea-note">All Idle Teas available in loose leaf bags or compostable tea satchels. Matchas and concentrates available in bulk only.</div>`;

  // Split into pages if needed
  if(items.length>maxPerPage) {
    const firstBatch=items.slice(0,maxPerPage);
    const rest=items.slice(maxPerPage);
    const firstPage=productPageHTML(cat,meta,firstBatch,colNum,colLabel,false);
    // Build overflow pages
    let overflowPages='';
    let i=0;
    while(i<rest.length) {
      const batch=rest.slice(i,i+maxPerPage);
      const isLastOverflow=(i+maxPerPage>=rest.length);
      const grid=isTea?`<div class="t-grid">${batch.map(tcCardHTML).join('')}</div>`:wrapGrid(batch,false,isNespresso);
      const noteHere=(isTea&&isLastOverflow)?TEA_NOTE:'';
      overflowPages+=`<section class="prod-overflow">
  <div class="prod-hdr">
    <div class="prod-hdr-title">${colLabel} <span style="font-size:14px;font-weight:400;color:var(--text-lt)">continued</span></div>
    <span class="prod-hdr-num">${colNum} / Collection</span>
  </div>${grid}${noteHere}<div class="page-footer"><span class="footer-word">FRATELLOCOFFEE.COM</span></div></section>`;
      i+=maxPerPage;
    }
    return firstPage+overflowPages;
  }

  let content='';
  if(cat==='Espresso' && meta.heroId) {
    const heroProduct=items.find(p=>p.id===meta.heroId);
    const rest=items.filter(p=>p.id!==meta.heroId);
    if(heroProduct) {
      content=heroHTML(heroProduct);
      if(rest.length) content+=wrapGrid(rest,false,false);
    } else {
      content=wrapGrid(items,false,false);
    }
  } else {
    content=wrapGrid(items,isTea,isNespresso);
  }
  if(isTea&&isLastBatch) content+=TEA_NOTE;

  return `<section class="${pageTag}">
  <div class="prod-hdr">
    <div class="prod-hdr-title">${colLabel}</div>
    <span class="prod-hdr-num">${colNum} / Collection</span>
  </div>
  ${content}
  <div class="page-foot"><span>Fratello Coffee</span><span>fratellocoffee.com</span></div>
</section>`;
}

function App(){
  // ── URL SHARING: read ?p=ID1,ID2 from URL on load ──
  const getInitialSelection=()=>{
    try{
      const params=new URLSearchParams(window.location.search);
      const pParam=params.get('p');
      if(pParam){
        const ids=pParam.split(',').filter(id=>PRODUCTS.some(pr=>pr.id===id));
        if(ids.length)return new Set(ids);
      }
    }catch(e){}
    return new Set();
  };
  const [selected,setSelected]=useState(getInitialSelection);
  const [activeCat,setActiveCat]=useState("All");
  const [search,setSearch]=useState("");
  const [clientName,setClientName]=useState(()=>{
    try{return new URLSearchParams(window.location.search).get('client')||"";}catch(e){return "";}
  });
  const [repName,setRepName]=useState("");
  const [showModal,setShowModal]=useState(false);
  const [modalOpen,setModalOpen]=useState(false);
  const [linkCopied,setLinkCopied]=useState(false);

  // ── Sync selection to URL (without reload) — skip if too many products to avoid browser crashes ──
  useEffect(()=>{
    try{
      const params=new URLSearchParams();
      if(selected.size>0&&selected.size<=40) params.set('p',[...selected].join(','));
      if(clientName) params.set('client',clientName);
      if(view==='proposal') params.set('view','proposal');
      const qs=params.toString();
      const newUrl=window.location.pathname+(qs?'?'+qs:'');
      window.history.replaceState(null,'',newUrl);
    }catch(e){/* silently fail on in-app browsers */}
  },[selected,clientName,view]);

  // ── Copy shareable link ──
  const copyShareLink=(includeView)=>{
    try{
      const params=new URLSearchParams();
      if(selected.size>0&&selected.size<=40) params.set('p',[...selected].join(','));
      if(clientName) params.set('client',clientName);
      if(includeView==='proposal') params.set('view','proposal');
      const url=window.location.origin+window.location.pathname+'?'+params.toString();
      if(navigator.clipboard&&navigator.clipboard.writeText){
        navigator.clipboard.writeText(url).then(()=>{
          setLinkCopied(true);setTimeout(()=>setLinkCopied(false),2000);
        }).catch(()=>{prompt("Copy this link:",url);});
      }else{prompt("Copy this link:",url);}
    }catch(e){alert("Could not copy link");}
  };

  useEffect(()=>{
    const splash=document.getElementById("splash");
    const t=setTimeout(()=>{splash&&splash.classList.add("out");},1200);
    return ()=>clearTimeout(t);
  },[]);

  useEffect(()=>{
    const handler=e=>{
      if(e.key==='/'&&!e.ctrlKey&&!e.metaKey&&document.activeElement.tagName!=='INPUT'){
        e.preventDefault();
        const el=document.getElementById('search-input');
        if(el)el.focus();
      }
      if(e.key==='Escape'&&document.activeElement.tagName==='INPUT'){
        document.activeElement.blur();
        setSearch('');
      }
    };
    document.addEventListener('keydown',handler);
    return ()=>document.removeEventListener('keydown',handler);
  },[]);

  // ── Auto-generate proposal HTML when view is 'proposal' and no HTML yet ──
  useEffect(()=>{
    if(view==='proposal'&&!proposalHTML&&selected.size>0){
      try{
        const items=PRODUCTS.filter(p=>selected.has(p.id));
        if(items.length){
          const html=buildProposalHTML(items,clientName,"");
          setProposalHTML(html);
        }else{
          setView('catalog');
        }
      }catch(e){
        console.error('Auto-generate proposal failed:',e);
        setView('catalog');
      }
    }
  },[view,proposalHTML,selected,clientName]);

  const openModal=()=>{setShowModal(true);setTimeout(()=>setModalOpen(true),10)};
  const closeModal=()=>{setModalOpen(false);setTimeout(()=>setShowModal(false),280)};

  const filtered=useMemo(()=>PRODUCTS.filter(p=>{
    if(activeCat!=="All"&&p.cat!==activeCat)return false;
    if(search){const q=search.toLowerCase();if(!p.name.toLowerCase().includes(q)&&!p.cat.toLowerCase().includes(q)&&!p.vibe.toLowerCase().includes(q)&&!p.id.toLowerCase().includes(q)&&!p.desc.toLowerCase().includes(q)&&!(p.eyebrow||'').toLowerCase().includes(q))return false;}
    return true;

  const selectedProducts=PRODUCTS.filter(p=>selected.has(p.id));

  const toggleGroup=cat=>{
    const ids=PRODUCTS.filter(p=>p.cat===cat).map(p=>p.id);
    if(!ids.length)return;
    const allSel=ids.every(id=>selected.has(id));
    setSelected(prev=>{const n=new Set(prev);if(allSel)ids.forEach(id=>n.delete(id));else ids.forEach(id=>n.add(id));return n});
  };

  const [view,setView]=useState(()=>{

      if(params.get('view')==='proposal'&&params.get('p')) return 'proposal';

    return 'catalog';

  const btn={cursor:"pointer",border:"none",borderRadius:6,fontSize:10,fontWeight:700,letterSpacing:1,padding:"7px 16px",transition:"all 0.15s",fontFamily:"'Montserrat',sans-serif"};

  
  if(view==="proposal"){
    return(
      <div style={{position:"fixed",inset:0,background:"#fff",zIndex:9999,display:"flex",flexDirection:"column"}}>

          <button onClick={()=>setView("catalog")} style={{

            textTransform:"uppercase",fontFamily:"'Montserrat',sans-serif"}}>
            {selectedProducts.length} products{clientName?" · "+clientName:""}
          </span>
          <div style={{display:"flex",gap:8,alignItems:"center"}}>
            <button onClick={()=>copyShareLink('proposal')} style={{
              cursor:"pointer",
              background:linkCopied?"rgba(46,180,175,0.2)":"rgba(255,255,255,0.08)",
              border:linkCopied?"1px solid rgba(46,180,175,0.5)":"1px solid rgba(255,255,255,0.15)",
              borderRadius:6,padding:"8px 16px",
              color:linkCopied?TEAL:"rgba(255,255,255,0.85)",
              fontSize:11,fontWeight:600,letterSpacing:1,
              fontFamily:"'Montserrat',sans-serif",transition:"all 0.2s"}}>
              {linkCopied?"\u2713 Link Copied":"Share Link \u2197"}
            </button>
            <button onClick={()=>{
              const f=document.getElementById("prop-frame");
              if(f&&f.contentWindow)f.contentWindow.print();
            }} style={{
              cursor:"pointer",background:TEAL,border:"none",borderRadius:6,
              padding:"8px 20px",color:"#fff",fontSize:11,fontWeight:700,
              letterSpacing:1,fontFamily:"'Montserrat',sans-serif"}}>
              Save PDF \u2193
            </button>
          </div>
        </div>
        <iframe id="prop-frame" srcDoc={proposalHTML}
          style={{flex:1,width:"100%",border:"none",display:"block"}}
          title="Fratello Proposal"/>
      </div>

  }

  return <div style={{background:"#0d0d0d",minHeight:"100vh",color:"#fff"}}>
    {/* Header */}

        <div className="hdr-sub" style={{fontSize:8,letterSpacing:3,color:TEAL,textTransform:"uppercase"}}>Proposal Builder</div>

        {selected.size>0&&<button onClick={copyShareLink} style={{...btn,background:linkCopied?"rgba(46,180,175,0.2)":"rgba(255,255,255,0.06)",color:linkCopied?TEAL:"rgba(255,255,255,0.4)",border:linkCopied?"1px solid rgba(46,180,175,0.4)":"1px solid transparent",transition:"all 0.2s"}}>

    </div>}

    {/* Filters */}
    <div className="mobile-filters" style={{padding:"11px 22px",display:"flex",gap:7,flexWrap:"wrap",alignItems:"center",background:"rgba(255,255,255,0.01)",borderBottom:"1px solid rgba(255,255,255,0.05)",position:"sticky",top:54,zIndex:40,backdropFilter:"blur(8px)"}}>
      <button onClick={toggleSelectAll} className="cat-pill" style={{cursor:"pointer",background:allSelected?"rgba(46,180,175,0.18)":"rgba(255,255,255,0.06)",border:"1px solid "+(allSelected?"rgba(46,180,175,0.5)":"rgba(255,255,255,0.12)"),borderRadius:6,padding:"7px 16px",color:allSelected?"#2eb4af":"rgba(255,255,255,0.55)",fontSize:10,fontWeight:700,letterSpacing:1,whiteSpace:"nowrap",flexShrink:0,transition:"all 0.15s"}}>
        {allSelected ? "✓ All Selected" : "Select All"}
      </button>
      <div style={{width:1,height:18,background:"rgba(255,255,255,0.1)",flexShrink:0}}/>
            <input id="search-input" value={search} onChange={e=>setSearch(e.target.value)} placeholder='Search products... ( / )' style={{background:"rgba(255,255,255,0.05)",border:"1px solid rgba(255,255,255,0.09)",borderRadius:6,padding:"7px 13px",color:"#fff",fontSize:11,width:220,fontFamily:"'Montserrat',sans-serif"}}/>
      {pill("All",activeCat==="All",()=>setActiveCat("All"),PRODUCTS.length)}
      {CATS.map(c=>pill(c,activeCat===c,()=>setActiveCat(c),catCounts[c]))}
      <div className="filter-count" style={{marginLeft:"auto",fontSize:9,letterSpacing:2,color:"rgba(255,255,255,0.18)",textTransform:"uppercase"}}>
        {filtered.length} products{selected.size>0&&<span style={{color:TEAL}}> · {selected.size} selected</span>}
      </div>
    </div>

    {/* Grid */}
    <div style={{padding:"20px 12px 100px"}}>
      {groupedByCategory?(()=>{
        const cats=Object.entries(groupedByCategory);
        return(<>
          {cats.map(([cat,items])=><div key={cat} style={{marginBottom:36}}>
            <CategoryRow cat={cat} products={items} selected={selected} onToggleGroup={toggleGroup}/>
            <div className="mobile-grid" style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(170px,1fr))",gap:11}}>
              {items.map((p,i)=><ProductCard key={p.id} p={p} sel={selected.has(p.id)} onToggle={toggle} animDelay={`${i*35}ms`}/>)}
            </div>
          </div>)}
        </>);
      })():
      <><div style={{marginBottom:16}}><CategoryRow cat={activeCat} products={filtered} selected={selected} onToggleGroup={toggleGroup}/></div>
      <div className="mobile-grid" style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(170px,1fr))",gap:11}}>
        {filtered.map((p,i)=><ProductCard key={p.id} p={p} sel={selected.has(p.id)} onToggle={toggle} animDelay={`${i*30}ms`}/>)}
        {filtered.length===0&&<div style={{gridColumn:"1/-1",textAlign:"center",padding:"80px 0",color:"rgba(255,255,255,0.15)",fontSize:13}}>No products match your search.</div>}
      </div></>}
    </div>

    {/* Floating bar */}
    <div className={`float-bar ${selected.size>0?"show":""}`}>
      <span style={{fontSize:12,color:"rgba(255,255,255,0.5)"}}><strong style={{color:"#fff"}}>{selected.size}</strong> product{selected.size!==1?"s":""} selected</span>
      <div style={{width:1,height:16,background:"rgba(255,255,255,0.1)"}}/>
      <button onClick={()=>setSelected(new Set())} style={{...btn,background:"none",color:"rgba(255,255,255,0.3)",padding:"3px 6px"}}>Clear</button>
      <button onClick={openModal} style={{...btn,background:TEAL,color:"#fff",borderRadius:24,padding:"8px 20px"}}>Generate Proposal →</button>
    </div>
  </div>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
